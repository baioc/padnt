<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<title
		th:text="${directory} + ${filename}"
	></title>

	<style>
		* {
			margin: 0;
			padding: 0;
			font-family: monospace;
		}
		body {
			height: 100vh;
			width: 100vw;
		}
		.flex {
			display: flex;
		}
		.column {
			height: 100%;
		}
		#folder {
			padding-left: 8px;
			padding-right: 8px;
			width: auto;
			color: dimgray;
			background-color: lightgray;
		}
		#folder h2 {
			margin-bottom: 2vh;
		}
		#folder ol {
			list-style: none;
		}
		#notepad {
			flex-grow: 1;
			color: black;
			background-color: white;
		}
		#notepad textarea {
			padding: 8px;
			width: calc(100% - 16px);
			height: calc(100% - 16px);
			overflow: auto;
			outline: none;
			resize: none;
			border: 0;
		}
	</style>
</head>

<body class="flex">
	<section id="folder" class="column" th:if="${subfiles.size()} > 0">
		<h2 th:text="${folder}"></h2>
		<ol th:each="subfile: ${subfiles}">
			<li><a th:href="${folder} + ${subfile}" th:text="${subfile}"></a></li>
		</ol>
	</section>

	<section id="notepad" class="column">
		<textarea wrap="off" autofocus oninput="changed=true"
			th:text="${content}"
		></textarea>
	</section>

	<script>
		var changed = false;
		function updateNotepad(path, content) {
			if (changed) {
				fetch(path, {
					method: 'PUT',
					headers: {
						'Content-Type': 'text/plain',
					},
					body: content.value,
				})
				.then(response => {
					console.debug(`PUT -> #${response.status}`);
				})
				.catch(error => {
					console.error('PUT error:', error);
				});
			} else {
				fetch(path, {
					method: 'GET',
					headers: {
						'Accept': 'text/plain',
					}
				})
				.then(response => {
					console.debug(`GET -> #${response.status}`);
					return response.text();
				})
				.then(text => {
					content.value = text;
				})
				.catch(error => {
					console.error('GET error:', error);
				});
			}
			changed = false;
		}
		const pathname = window.location.pathname;
		const textarea = document.getElementById('notepad').getElementsByTagName('textarea')[0];
		setInterval(updateNotepad, 3000, pathname, textarea);
	</script>
</body>

</html>
